<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akhil Kommuru | Secure Portal</title>
    <style>
        :root {
            /* Seafoam Green Scheme */
            --seafoam: #2dd4bf;
            --seafoam-glow: rgba(45, 212, 191, 0.4);
            --seafoam-light: #5eead4;
            
            /* Deep Space Backgrounds */
            --bg-base: #06090a;
            --bg-layer-1: #0b1114;
            --glass-bg: rgba(15, 23, 26, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Clouds */
        .cloud-container {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: drift 25s infinite alternate ease-in-out;
        }

        .cloud-1 {
            top: -10%;
            left: 0%;
            width: 55vw;
            height: 55vw;
            background: rgba(45, 212, 191, 0.12); /* Seafoam cloud */
            animation-duration: 30s;
        }

        .cloud-2 {
            bottom: -15%;
            right: -5%;
            width: 50vw;
            height: 50vw;
            background: rgba(20, 30, 40, 0.7);
            animation-delay: -15s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-40px, 50px) scale(1.15); }
        }

        /* Layout Wrapper */
        .portal-layout {
            display: flex;
            gap: 2rem;
            z-index: 10;
            padding: 2rem;
            max-width: 1200px;
            align-items: stretch;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Glass Containers */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            opacity: 0;
        }

        .main-panel {
            padding: 3.5rem 4rem;
            width: 420px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .side-panel {
            padding: 2.5rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            background: rgba(10, 15, 20, 0.75);
            position: relative;
            overflow: hidden;
        }

        /* View Switching */
        .view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        /* Hologram Physics Cube */
        .hologram-scene {
            width: 110px;
            height: 110px;
            perspective: 800px;
            margin-bottom: 2.5rem;
        }

        .cube-outer, .cube-inner {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
        }

        .cube-outer { animation: rotate3D 18s infinite linear; }
        .cube-inner { transform: scale(0.45); animation: rotate3DReverse 9s infinite linear; }

        .face {
            position: absolute;
            border: 1px solid rgba(45, 212, 191, 0.6);
            background: rgba(45, 212, 191, 0.03);
            box-shadow: 0 0 15px var(--seafoam-glow) inset;
        }

        .outer-face { width: 110px; height: 110px; }
        .inner-face { 
            width: 110px; height: 110px;
            border-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,255,0.2) inset;
        }

        .of-front  { transform: rotateY(  0deg) translateZ(55px); }
        .of-back   { transform: rotateY(180deg) translateZ(55px); }
        .of-right  { transform: rotateY( 90deg) translateZ(55px); }
        .of-left   { transform: rotateY(-90deg) translateZ(55px); }
        .of-top    { transform: rotateX( 90deg) translateZ(55px); }
        .of-bottom { transform: rotateX(-90deg) translateZ(55px); }

        .if-front  { transform: rotateY(  0deg) translateZ(55px); }
        .if-back   { transform: rotateY(180deg) translateZ(55px); }
        .if-right  { transform: rotateY( 90deg) translateZ(55px); }
        .if-left   { transform: rotateY(-90deg) translateZ(55px); }
        .if-top    { transform: rotateX( 90deg) translateZ(55px); }
        .if-bottom { transform: rotateX(-90deg) translateZ(55px); }

        @keyframes rotate3D {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(180deg); }
        }
        @keyframes rotate3DReverse {
            0% { transform: scale(0.45) rotateX(360deg) rotateY(0deg) rotateZ(360deg); }
            100% { transform: scale(0.45) rotateX(0deg) rotateY(-360deg) rotateZ(0deg); }
        }

        /* Typography & Breathing Glow */
        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.9rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .name-glow {
            animation: breathe 4s ease-in-out infinite;
        }

        .accent {
            color: var(--seafoam-light);
            font-weight: 500;
        }

        @keyframes breathe {
            0%, 100% { text-shadow: 0 0 10px rgba(45, 212, 191, 0.1), 0 0 20px rgba(45, 212, 191, 0.05); }
            50% { text-shadow: 0 0 15px rgba(45, 212, 191, 0.5), 0 0 30px rgba(45, 212, 191, 0.3); }
        }

        /* Terminal Display */
        .terminal-container {
            font-family: 'SF Mono', Consolas, monospace;
            font-size: 0.8rem;
            color: #8b95a5;
            background: var(--input-bg);
            padding: 14px 18px;
            border-radius: 10px;
            border-left: 2px solid var(--seafoam);
            margin: 1.5rem 0;
            width: 100%;
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 1em;
            background: var(--seafoam);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 4px;
        }

        .local-time {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(255,255,255,0.08);
            font-size: 0.7rem;
        }

        /* Forms & Inputs */
        .form-group {
            width: 100%;
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 16px;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--seafoam);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.2);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            height: 16px;
            text-align: center;
        }

        /* Apple Inspired Buttons */
        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 32px;
            border-radius: 999px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
            margin-top: 1rem;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--seafoam);
            transform: translateY(-2px);
            color: var(--seafoam-light);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(45, 212, 191, 0.15);
        }

        .btn-ghost {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 1rem;
            box-shadow: none;
        }

        .btn-ghost:hover {
            color: #fff;
            transform: none;
            border-color: transparent;
            box-shadow: none;
        }

        /* --- Weather Panel --- */
        .weather-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 1rem;
            width: 100%;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--seafoam);
            border-radius: 50%;
            animation: pulseDot 2s infinite;
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin: 2rem 0 1rem 0;
        }

        .weather-icon {
            font-size: 4rem;
            color: var(--seafoam-light);
            text-shadow: 0 0 20px rgba(45, 212, 191, 0.3);
            animation: floatIcon 4s ease-in-out infinite;
        }

        .weather-temp {
            font-size: 4.5rem;
            font-weight: 200;
            letter-spacing: -3px;
            line-height: 1;
        }

        .weather-desc {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 2.5rem;
            width: 100%;
            text-align: left;
        }

        .weather-metrics {
            display: flex;
            justify-content: space-between;
            width: 100%;
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .metric {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 1rem;
            color: #f1f5f9;
            font-weight: 500;
        }

        /* Success State */
        .success-icon {
            font-size: 3.5rem;
            color: var(--seafoam-light);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
        }

        @keyframes floatIn { 
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes pulseDot {
            0% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(45, 212, 191, 0); }
            100% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0); }
        }
    </style>
</head>
<body>

    <div class="cloud-container">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
    </div>

    <div class="portal-layout">
        
        <!-- Main Authentication Panel -->
        <div class="glass-card main-panel">
            
            <div id="view-landing" class="view">
                <div class="hologram-scene">
                    <div class="cube-outer">
                        <div class="face outer-face of-front"></div>
                        <div class="face outer-face of-back"></div>
                        <div class="face outer-face of-right"></div>
                        <div class="face outer-face of-left"></div>
                        <div class="face outer-face of-top"></div>
                        <div class="face outer-face of-bottom"></div>
                    </div>
                    <div class="cube-inner">
                        <div class="face inner-face if-front"></div>
                        <div class="face inner-face if-back"></div>
                        <div class="face inner-face if-right"></div>
                        <div class="face inner-face if-left"></div>
                        <div class="face inner-face if-top"></div>
                        <div class="face inner-face if-bottom"></div>
                    </div>
                </div>

                <h1 class="name-glow">Akhil <span class="accent">Kommuru</span></h1>

                <div class="terminal-container">
                    <div>
                        <span style="color: var(--seafoam)">$</span> <span id="typewriter"></span><span class="cursor"></span>
                    </div>
                    <div class="local-time">
                        <span>SYS_TIME:</span>
                        <span id="clock" style="color: #fff;">Syncing...</span>
                    </div>
                </div>

                <button class="btn" onclick="switchView('view-login')">Developer Lab Portal</button>
            </div>

            <div id="view-login" class="view hidden">
                <h1 style="margin-bottom: 2rem; margin-top: 1rem;" class="name-glow">Secure <span class="accent">Login</span></h1>
                
                <div class="form-group">
                    <input type="text" id="username" placeholder="Username" autocomplete="off">
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password">
                </div>
                
                <div id="error-msg" class="error-msg"></div>
                
                <button class="btn" onclick="authenticate()">Authenticate</button>
                <button class="btn btn-ghost" onclick="switchView('view-landing')">Abort Connection</button>
            </div>

            <div id="view-success" class="view hidden">
                <div class="success-icon">✦</div>
                <h1 class="name-glow">Welcome <span class="accent">Akhil</span></h1>
                <p style="color: #8b95a5; margin-top: 1rem; text-align: center; font-size: 0.9rem; line-height: 1.5;">
                    Biometric match confirmed.<br>Establishing secure connection to workspace...
                </p>
            </div>

        </div>

        <!-- Enhanced Weather Panel -->
        <div class="glass-card side-panel">
            <div class="weather-header">
                <div class="pulse-dot"></div>
                <span id="w-loc">Acquiring Location...</span>
            </div>

            <div class="weather-main">
                <div class="weather-icon" id="w-icon">☁</div>
                <div class="weather-temp" id="w-temp">--°</div>
            </div>
            
            <div class="weather-desc" id="w-desc">Syncing Feed...</div>
            
            <div class="weather-metrics">
                <div class="metric">
                    <span class="metric-label">Wind</span>
                    <span class="metric-value" id="w-wind">-- km/h</span>
                </div>
                <div class="metric" style="text-align: right;">
                    <span class="metric-label">Humidity</span>
                    <span class="metric-value" id="w-hum">-- %</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- UI Switching Logic ---
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => {
                v.classList.add('hidden');
                v.style.opacity = 0;
            });
            const targetView = document.getElementById(viewId);
            targetView.classList.remove('hidden');
            setTimeout(() => targetView.style.opacity = 1, 50);
            
            if(viewId === 'view-login') {
                document.getElementById('username').focus();
                document.getElementById('error-msg').textContent = '';
            }
        }

        // --- Authentication Logic ---
        function authenticate() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorArea = document.getElementById('error-msg');

            if (user === 'akhilkommuru' && pass === 'Krishna@143') {
                switchView('view-success');
            } else {
                errorArea.textContent = 'Invalid credentials. Intrusion logged.';
                document.getElementById('password').value = '';
            }
        }

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') authenticate();
        });

        // --- Terminal Typewriter ---
        const text = "Initializing secure environment...";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById('typewriter').innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 40 + Math.random() * 40);
            }
        }
        setTimeout(type, 800);

        // --- Dynamic Clock ---
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString(undefined, { 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
            let timeZoneName = 'Local';
            try {
                timeZoneName = Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace('_', ' ');
            } catch (e) {}

            document.getElementById('clock').textContent = `${timeString} [${timeZoneName}]`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // --- Dynamic Geolocation Weather Feed ---
        async function fetchWeatherData(lat, lon, locationName) {
            try {
                // Fetch weather including wind and humidity metrics
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m`);
                const data = await response.json();
                
                const temp = Math.round(data.current_weather.temperature);
                const wind = Math.round(data.current_weather.windspeed);
                const code = data.current_weather.weathercode;
                
                // Get current hour humidity
                const currentHour = new Date().getHours();
                const humidity = data.hourly.relativehumidity_2m[currentHour] || '--';
                
                let condition = "Clear";
                let icon = "☀";

                // WMO Weather interpretation codes
                if (code === 0) { condition = "Clear Skies"; icon = "☀"; }
                else if (code >= 1 && code <= 3) { condition = "Partly Cloudy"; icon = "⛅"; }
                else if (code >= 45 && code <= 48) { condition = "Fog"; icon = "🌫"; }
                else if (code >= 51 && code <= 67) { condition = "Rain"; icon = "☂"; }
                else if (code >= 71 && code <= 77) { condition = "Snow"; icon = "❄"; }
                else if (code >= 80 && code <= 82) { condition = "Showers"; icon = "🌧"; }
                else if (code >= 95) { condition = "Storm"; icon = "⚡"; }

                document.getElementById('w-temp').textContent = `${temp}°`;
                document.getElementById('w-desc').textContent = condition;
                document.getElementById('w-icon').textContent = icon;
                document.getElementById('w-wind').textContent = `${wind} km/h`;
                document.getElementById('w-hum').textContent = `${humidity}%`;
                document.getElementById('w-loc').textContent = locationName;

            } catch (error) {
                document.getElementById('w-loc').textContent = "Feed Offline";
                document.getElementById('w-desc').textContent = "Connection Error";
                document.getElementById('w-icon').textContent = "⚠";
            }
        }

        async function initWeather() {
            // Default fallback location (Midrand, SA)
            const fallbackLat = -25.9964;
            const fallbackLon = 28.1320;
            const fallbackName = "MIDRAND, ZA (DEFAULT)";

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        // Free client-side reverse geocoding to get the user's city name
                        const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
                        const geoData = await geoRes.json();
                        const locName = `${geoData.city || geoData.locality || "LOCAL"}, ${geoData.countryCode}`.toUpperCase();
                        
                        fetchWeatherData(lat, lon, locName);
                    } catch (e) {
                        // If geocoding fails, still show weather for coords
                        fetchWeatherData(lat, lon, "LOCAL FEED");
                    }
                }, (error) => {
                    // User denied location or error occurred; use fallback
                    fetchWeatherData(fallbackLat, fallbackLon, fallbackName);
                });
            } else {
                // Geolocation not supported
                fetchWeatherData(fallbackLat, fallbackLon, fallbackName);
            }
        }
        
        // Initialize weather
        initWeather();
        // Refresh every 30 mins
        setInterval(initWeather, 1800000); 
    </script>

</body>
</html>
